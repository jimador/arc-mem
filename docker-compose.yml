services:
  neo4j:
    image: neo4j:5-community
    container_name: arc-mem-neo4j
    ports:
      - "127.0.0.1:7687:7687"   # Bolt
      - "127.0.0.1:7474:7474"   # HTTP browser
    environment:
      - NEO4J_AUTH=neo4j/arcmem123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "arcmem123", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  embabel-hub:
    image: embabel/hub:latest
    container_name: embabel-hub
    ports:
      - "21337:1337"   # Guide API (backend)
      - "27474:7474"   # Neo4j Browser (internal to hub)
      - "27687:7687"   # Neo4j Bolt (internal to hub)
      - "8042:8042"    # Hub Frontend
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - embabel_neo4j_data:/data
      - embabel_neo4j_logs:/logs

volumes:
  neo4j_data:
  neo4j_logs:
  embabel_neo4j_data:
  embabel_neo4j_logs:
