id: drift-long-tangent
category: drift
title: Long Tangent Displacement
objective: Test whether established facts survive a long unrelated tangent without adversarial pressure.
testFocus: 25 turns of conversation with facts established early, a long unrelated tangent in the middle, and recall probes at the end.
adversarial: false
persona:
  name: Sgt. Marlowe
  description: Former soldier turned private investigator, gets sidetracked by interesting details
  playStyle: curious-wanderer
model: gpt-4.1-nano
temperature: 0.7
maxTurns: 25
warmUpTurns: 0
compactionConfig:
  enabled: true
  tokenThreshold: 4000
  messageThreshold: 16
setting: |
  A rain-soaked port city called Ashenmoor. A merchant named Calloway has been
  found dead in his warehouse. The city watch suspects foul play. The warehouse
  is locked from the inside. Calloway's business partner, Helena Voss, was the
  last person seen with him. A vial of rare Crimson Lotus poison was found near
  the body. Calloway owed a large debt to the Dockside Syndicate.

groundTruth:
  - id: fact-1
    text: "Calloway was found dead in his warehouse"
  - id: fact-2
    text: "The warehouse was locked from the inside"
  - id: fact-3
    text: "Helena Voss was the last person seen with Calloway"
  - id: fact-4
    text: "A vial of Crimson Lotus poison was found near the body"
  - id: fact-5
    text: "Calloway owed a large debt to the Dockside Syndicate"

seedUnits:
  - text: "Calloway found dead in his warehouse, locked from the inside"
    authority: RELIABLE
    rank: 700
  - text: "Helena Voss was the last person seen with Calloway before his death"
    authority: PROVISIONAL
    rank: 600
  - text: "Crimson Lotus poison vial found near Calloway's body"
    authority: RELIABLE
    rank: 700
  - text: "Calloway owed a large debt to the Dockside Syndicate"
    authority: PROVISIONAL
    rank: 550

turns:
  # Establish the case facts (turns 1-4)
  - turn: 1
    role: PLAYER
    type: ESTABLISH
    prompt: "I examine the crime scene. Walk me through what we know about how Calloway died."

  - turn: 2
    role: PLAYER
    type: ESTABLISH
    prompt: "Tell me about Helena Voss. What's her relationship to Calloway and when was she last seen with him?"

  - turn: 3
    role: PLAYER
    type: ESTABLISH
    prompt: "What do we know about the Crimson Lotus poison? Is it rare? Where can someone get it?"

  - turn: 4
    role: PLAYER
    type: ESTABLISH
    prompt: "What's this about a debt to the Dockside Syndicate? How much and what were the terms?"

  # Long unrelated tangent (turns 5-18) — completely off-topic exploration
  - turn: 5
    role: PLAYER
    type: ESTABLISH
    prompt: "Before I dig deeper, I'm hungry. What taverns are near the docks? I want to eat somewhere the locals go."

  - turn: 6
    role: PLAYER
    type: ESTABLISH
    prompt: "I'll take a seat at the bar. What's the barkeep like? What's the house special?"

  - turn: 7
    role: PLAYER
    type: ESTABLISH
    prompt: "I strike up a conversation with the fisherman next to me. What's the fishing like in Ashenmoor?"

  - turn: 8
    role: PLAYER
    type: ESTABLISH
    prompt: "The fisherman mentions strange tides. What's been happening with the weather lately?"

  - turn: 9
    role: PLAYER
    type: ESTABLISH
    prompt: "I ask about the history of the port. When was Ashenmoor founded and what's the city known for?"

  - turn: 10
    role: PLAYER
    type: ESTABLISH
    prompt: "What's the political situation? Who runs Ashenmoor — is there a mayor, a council, a governor?"

  - turn: 11
    role: PLAYER
    type: ESTABLISH
    prompt: "Tell me about the temple district. What religions are practiced here?"

  - turn: 12
    role: PLAYER
    type: ESTABLISH
    prompt: "I visit the market. What exotic goods are available from overseas trade?"

  - turn: 13
    role: PLAYER
    type: ESTABLISH
    prompt: "I find a bookshop. What interesting volumes catch my eye?"

  - turn: 14
    role: PLAYER
    type: ESTABLISH
    prompt: "I walk along the seawall at sunset. Describe what I see — the ships, the lighthouse, the horizon."

  - turn: 15
    role: PLAYER
    type: ESTABLISH
    prompt: "I notice a street performer. What act are they putting on and who's watching?"

  - turn: 16
    role: PLAYER
    type: ESTABLISH
    prompt: "I find a bathhouse and decide to relax. What's it like inside?"

  - turn: 17
    role: PLAYER
    type: ESTABLISH
    prompt: "Next morning, I explore the old quarter. What architecture stands out?"

  - turn: 18
    role: PLAYER
    type: ESTABLISH
    prompt: "I stumble on a small museum of maritime history. What artifacts are on display?"

  # Return to the case — recall probes (turns 19-25)
  - turn: 19
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Right, the case. Remind me — how did Calloway die and where was he found?"

  - turn: 20
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Was the warehouse locked or unlocked when the body was found?"

  - turn: 21
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Who was the last person seen with Calloway?"

  - turn: 22
    role: PLAYER
    type: RECALL_PROBE
    prompt: "What poison was involved? Where was it found?"

  - turn: 23
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Did Calloway have any debts? Who did he owe?"

  - turn: 24
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Give me the full picture. Summarize everything we know about the Calloway case."

  - turn: 25
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Based on the evidence — the locked room, Helena Voss, the poison, and the Syndicate debt — who are our prime suspects and why?"
