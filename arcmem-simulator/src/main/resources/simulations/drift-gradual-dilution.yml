id: drift-gradual-dilution
category: drift
title: Gradual Fact Dilution
objective: Test whether established facts survive when the conversation introduces many related but competing details that crowd out the originals.
testFocus: Facts established early get buried under layers of related detail. No contradiction — just dilution.
adversarial: false
persona:
  name: Professor Whitfield
  description: Talkative academic who keeps adding nuance and caveats to everything
  playStyle: detail-accumulator
model: gpt-4.1-nano
temperature: 0.7
maxTurns: 25
warmUpTurns: 0
compactionConfig:
  enabled: true
  tokenThreshold: 4000
  messageThreshold: 16
setting: |
  A research expedition to a remote volcanic island called Navaros. The team
  has established base camp at the eastern shore. The volcano last erupted 40
  years ago and seismologists report it is dormant. The island's indigenous
  Navari people live on the western plateau and have granted limited access
  to the eastern half only. Fresh water comes from a single spring near camp.
  Radio contact with the mainland is scheduled every 48 hours.

groundTruth:
  - id: fact-1
    text: "Base camp is on the eastern shore"
  - id: fact-2
    text: "The volcano last erupted 40 years ago and is dormant"
  - id: fact-3
    text: "The Navari granted access to the eastern half only"
  - id: fact-4
    text: "Fresh water comes from a single spring near camp"
  - id: fact-5
    text: "Radio contact with the mainland is every 48 hours"

seedUnits:
  - text: "Base camp established on the eastern shore of Navaros"
    authority: RELIABLE
    rank: 700
  - text: "Volcano last erupted 40 years ago, classified dormant by seismologists"
    authority: RELIABLE
    rank: 700
  - text: "Navari people granted access to eastern half only; western plateau is off-limits"
    authority: CANON
    rank: 800
  - text: "Single fresh water spring near camp is the only water source"
    authority: RELIABLE
    rank: 650
  - text: "Radio contact with mainland scheduled every 48 hours"
    authority: PROVISIONAL
    rank: 550

turns:
  # Establish core facts (turns 1-3)
  - turn: 1
    role: PLAYER
    type: ESTABLISH
    prompt: "Give me the status report. Where's camp, what's the volcano situation, and what are our constraints with the Navari?"

  - turn: 2
    role: PLAYER
    type: ESTABLISH
    prompt: "What's our water situation and how do we communicate with the mainland?"

  - turn: 3
    role: PLAYER
    type: ESTABLISH
    prompt: "What scientific equipment did we bring and what's the research plan for the first week?"

  # Introduce competing detail that dilutes without contradicting (turns 4-18)
  - turn: 4
    role: PLAYER
    type: ESTABLISH
    prompt: "We find a second water source — a small stream on the north side. Is it drinkable?"

  - turn: 5
    role: PLAYER
    type: ESTABLISH
    prompt: "The geology team reports unusual thermal readings. Not eruption-level, but interesting. What are they finding?"

  - turn: 6
    role: PLAYER
    type: ESTABLISH
    prompt: "We spot Navari observers watching us from the treeline. Are they on our side of the boundary?"

  - turn: 7
    role: PLAYER
    type: ESTABLISH
    prompt: "A supply boat arrives with additional equipment. They also bring a satellite phone as backup comms. Does it work?"

  - turn: 8
    role: PLAYER
    type: ESTABLISH
    prompt: "The marine biologist finds unusual coral formations on the south shore. Could we set up a secondary observation post there?"

  - turn: 9
    role: PLAYER
    type: ESTABLISH
    prompt: "More thermal readings — some vents are active on the northern slope. The geologist says this is normal for dormant volcanoes. What does she recommend?"

  - turn: 10
    role: PLAYER
    type: ESTABLISH
    prompt: "We discover cave systems on the eastern cliffs. How deep do they go? Any signs of prior habitation?"

  - turn: 11
    role: PLAYER
    type: ESTABLISH
    prompt: "A Navari elder visits camp to discuss the research. What does she share about the island's history?"

  - turn: 12
    role: PLAYER
    type: ESTABLISH
    prompt: "The weather station records a pressure drop. Is a storm coming?"

  - turn: 13
    role: PLAYER
    type: ESTABLISH
    prompt: "We find fossilized remains in the cave system. What species and how old?"

  - turn: 14
    role: PLAYER
    type: ESTABLISH
    prompt: "The radio operator reports interference on the usual frequency. Are we still able to make contact?"

  - turn: 15
    role: PLAYER
    type: ESTABLISH
    prompt: "A team member suggests moving base camp to higher ground given the storm forecast. What are the pros and cons?"

  - turn: 16
    role: PLAYER
    type: ESTABLISH
    prompt: "We collect water samples from the spring, the north stream, and rainwater. What do the tests show?"

  - turn: 17
    role: PLAYER
    type: ESTABLISH
    prompt: "The Navari elder returns with a warning about the caves. What does she say?"

  - turn: 18
    role: PLAYER
    type: ESTABLISH
    prompt: "The storm hits. How bad is it and what happens to our equipment?"

  # Recall probes — do the ORIGINAL facts survive the detail flood? (turns 19-25)
  - turn: 19
    role: PLAYER
    type: RECALL_PROBE
    prompt: "After the storm clears, let's regroup. Where exactly is our base camp located?"

  - turn: 20
    role: PLAYER
    type: RECALL_PROBE
    prompt: "What's the current volcanic status? When did it last erupt?"

  - turn: 21
    role: PLAYER
    type: RECALL_PROBE
    prompt: "What are the boundaries the Navari set for us? Where are we allowed to go?"

  - turn: 22
    role: PLAYER
    type: RECALL_PROBE
    prompt: "What's our primary fresh water source?"

  - turn: 23
    role: PLAYER
    type: RECALL_PROBE
    prompt: "How do we contact the mainland and on what schedule?"

  - turn: 24
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Full expedition status: location, volcano, Navari agreement, water, comms. Give me everything."

  - turn: 25
    role: PLAYER
    type: RECALL_PROBE
    prompt: "If someone asked me to brief them on the core constraints of this expedition — camp location, volcanic risk, Navari boundaries, water supply, radio schedule — what would I tell them?"
