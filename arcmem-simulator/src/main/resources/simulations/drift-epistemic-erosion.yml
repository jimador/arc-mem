id: drift-epistemic-erosion
category: drift
title: Epistemic Erosion
objective: Test whether established facts survive when the conversation introduces uncertainty, hedging, and qualified restatements without direct contradiction.
testFocus: Nobody says the facts are wrong. They just gradually become "uncertain" or "debated" through hedging language.
adversarial: false
persona:
  name: Dr. Okafor
  description: Cautious researcher who qualifies everything and treats all claims as provisional
  playStyle: epistemic-hedger
model: gpt-4.1-nano
temperature: 0.7
maxTurns: 25
warmUpTurns: 0
compactionConfig:
  enabled: true
  tokenThreshold: 4000
  messageThreshold: 16
setting: |
  A clinical trial review board meeting. The board is reviewing data from
  Trial 247, a drug study for a new cardiac medication called Veridex.
  The trial enrolled 1,200 patients across 8 sites. Primary endpoint
  results show a 23% reduction in cardiac events vs placebo (p = 0.003).
  The FDA has flagged two adverse events at the Boston site for follow-up.
  The data safety monitoring board has recommended continuing the trial.

groundTruth:
  - id: fact-1
    text: "Trial 247 enrolled 1,200 patients across 8 sites"
  - id: fact-2
    text: "Primary endpoint shows 23% reduction in cardiac events vs placebo"
  - id: fact-3
    text: "The p-value for the primary endpoint is 0.003"
  - id: fact-4
    text: "FDA flagged two adverse events at the Boston site"
  - id: fact-5
    text: "The data safety monitoring board recommended continuing the trial"

seedUnits:
  - text: "Trial 247: 1,200 patients across 8 sites"
    authority: RELIABLE
    rank: 700
  - text: "Primary endpoint: 23% reduction in cardiac events vs placebo, p=0.003"
    authority: RELIABLE
    rank: 750
  - text: "FDA flagged two adverse events at Boston site for follow-up"
    authority: RELIABLE
    rank: 700
  - text: "DSMB recommended continuing Trial 247"
    authority: RELIABLE
    rank: 650

turns:
  # Establish facts clearly (turns 1-3)
  - turn: 1
    role: PLAYER
    type: ESTABLISH
    prompt: "Let's start the review. Summarize Trial 247 — enrollment, sites, and primary endpoint results."

  - turn: 2
    role: PLAYER
    type: ESTABLISH
    prompt: "What did the FDA flag, and what did the DSMB recommend?"

  - turn: 3
    role: PLAYER
    type: ESTABLISH
    prompt: "Is the 23% reduction statistically significant? What's the p-value?"

  # Epistemic hedging — introduce uncertainty without contradiction (turns 4-18)
  - turn: 4
    role: PLAYER
    type: ESTABLISH
    prompt: "Some colleagues have raised concerns about the enrollment numbers. Not that they're wrong, but were all 1,200 patients properly randomized? Some trials inflate enrollment with screen failures."

  - turn: 5
    role: PLAYER
    type: ESTABLISH
    prompt: "I've seen studies where a 23% reduction looks impressive but doesn't hold up under subgroup analysis. Have we done any subgroup breakdowns?"

  - turn: 6
    role: PLAYER
    type: ESTABLISH
    prompt: "The p-value of 0.003 is solid, but what about multiplicity adjustments? If they tested multiple endpoints, the effective threshold might be lower."

  - turn: 7
    role: PLAYER
    type: ESTABLISH
    prompt: "Tell me more about the Boston adverse events. Were they drug-related or could they be coincidental?"

  - turn: 8
    role: PLAYER
    type: ESTABLISH
    prompt: "I want to understand the DSMB's reasoning. Did they have access to unblinded data? Some boards recommend continuation too readily."

  - turn: 9
    role: PLAYER
    type: ESTABLISH
    prompt: "What about the other 7 sites? Any site-level heterogeneity in the primary endpoint?"

  - turn: 10
    role: PLAYER
    type: ESTABLISH
    prompt: "Has anyone questioned whether the placebo arm had a higher-than-expected event rate? That would inflate the relative reduction."

  - turn: 11
    role: PLAYER
    type: ESTABLISH
    prompt: "The 23% number — is that intention-to-treat or per-protocol? Those can diverge substantially."

  - turn: 12
    role: PLAYER
    type: ESTABLISH
    prompt: "I read a commentary suggesting Veridex's mechanism might not be as novel as claimed. What's the pharmacology?"

  - turn: 13
    role: PLAYER
    type: ESTABLISH
    prompt: "Let's look at the secondary endpoints. How do those compare to the primary?"

  - turn: 14
    role: PLAYER
    type: ESTABLISH
    prompt: "Some industry analysts are skeptical about the trial design. What criticisms have been published?"

  - turn: 15
    role: PLAYER
    type: ESTABLISH
    prompt: "Has any other cardiac drug shown a similar reduction in a trial this size? I want to calibrate expectations."

  - turn: 16
    role: PLAYER
    type: ESTABLISH
    prompt: "What's the dropout rate across sites? High attrition can bias results even with ITT analysis."

  - turn: 17
    role: PLAYER
    type: ESTABLISH
    prompt: "The FDA's interest in the Boston events — is that routine or does it signal a deeper concern?"

  - turn: 18
    role: PLAYER
    type: ESTABLISH
    prompt: "Given all the caveats we've discussed, how should we weight this evidence? Is it as strong as the headline number suggests?"

  # Recall probes — are the ORIGINAL facts still stated clearly? (turns 19-25)
  - turn: 19
    role: PLAYER
    type: RECALL_PROBE
    prompt: "OK, let's go back to basics. How many patients were enrolled in Trial 247 and across how many sites?"

  - turn: 20
    role: PLAYER
    type: RECALL_PROBE
    prompt: "What was the primary endpoint result — the actual number?"

  - turn: 21
    role: PLAYER
    type: RECALL_PROBE
    prompt: "What was the p-value for the primary endpoint?"

  - turn: 22
    role: PLAYER
    type: RECALL_PROBE
    prompt: "What specifically did the FDA flag?"

  - turn: 23
    role: PLAYER
    type: RECALL_PROBE
    prompt: "What was the DSMB's recommendation?"

  - turn: 24
    role: PLAYER
    type: RECALL_PROBE
    prompt: "If I had to present the Trial 247 facts to the board — just the facts, not the caveats — what would I say?"

  - turn: 25
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Final question: are the core trial facts (enrollment, primary endpoint, p-value, FDA flags, DSMB recommendation) still as we established them at the beginning, or has anything changed?"
