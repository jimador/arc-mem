id: narrative-dm-driven
category: baseline
adversarial: false
persona:
  name: Old Tam
  description: Elderly halfling storyteller who speaks in third person and loves embellishment
  playStyle: narrative-immersive
model: gpt-4.1-mini
temperature: 0.7
maxTurns: 12
warmUpTurns: 3
trustConfig:
  profile: NARRATIVE
  weightOverrides: {}
setting: |
  The Amber Road stretches from the port city of Salthaven to the mountain
  monastery of Skyreach. Along the way lies the Thornwild Forest, home to
  a giant named Grundle who collects tolls from travelers. The monastery
  is led by Abbess Luminara, a blind aasimar monk who can see through
  divination. A caravan of amber merchants has gone missing on the road,
  and their families have hired the party to find them. The local ranger
  guild suspects bandits, but strange claw marks suggest something worse.

groundTruth:
  - id: fact-1
    text: "The Amber Road connects Salthaven to the Skyreach monastery"
  - id: fact-2
    text: "Grundle is a giant who collects tolls in the Thornwild Forest"
  - id: fact-3
    text: "Abbess Luminara is a blind aasimar monk who sees through divination"
  - id: fact-4
    text: "A caravan of amber merchants has gone missing on the road"
  - id: fact-5
    text: "Strange claw marks along the road suggest something worse than bandits"

seedUnits:
  - text: "The Amber Road runs from Salthaven to Skyreach monastery"
    authority: RELIABLE
    rank: 700
  - text: "A caravan of amber merchants disappeared on the Amber Road"
    authority: RELIABLE
    rank: 700
  - text: "Grundle the giant collects tolls in the Thornwild Forest"
    authority: PROVISIONAL
    rank: 550

turns:
  - turn: 1
    role: PLAYER
    type: ESTABLISH
    prompt: "Old Tam adjusts his pack and looks down the Amber Road. 'Old Tam wonders what the road looks like today.' What does he see?"

  - turn: 2
    role: PLAYER
    type: ESTABLISH
    prompt: "Old Tam asks the merchants' families about the missing caravan. When did they last hear from them?"

  - turn: 3
    role: PLAYER
    type: ESTABLISH
    prompt: "Old Tam examines the strange claw marks on the road. What creature could have made them?"

  - turn: 4
    role: PLAYER
    type: ESTABLISH
    prompt: "We enter the Thornwild Forest. What is the atmosphere like under the canopy?"

  - turn: 5
    role: PLAYER
    type: ESTABLISH
    prompt: "Old Tam encounters Grundle at his toll bridge. What does the giant demand?"

  - turn: 6
    role: PLAYER
    type: ESTABLISH
    prompt: "Old Tam tries to charm Grundle with a story. Does the giant have a weakness for tales?"

  - turn: 7
    role: PLAYER
    type: ESTABLISH
    prompt: "Past the forest, we approach Skyreach monastery. What does it look like perched on the mountain?"

  - turn: 8
    role: PLAYER
    type: ESTABLISH
    prompt: "I request to speak with Abbess Luminara. What does she sense about the missing caravan through her divination?"

  - turn: 9
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Old Tam recounts the journey so far. What do we know about the caravan, the claw marks, Grundle, and the Abbess?"

  - turn: 10
    role: PLAYER
    type: ESTABLISH
    prompt: "Following Luminara's guidance, we search a specific stretch of the road. What do we find?"

  - turn: 11
    role: PLAYER
    type: ESTABLISH
    prompt: "We discover what happened to the caravan. What is the truth behind their disappearance?"

  - turn: 12
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Old Tam tells the whole tale from start to finish. Summarize everything about the road, the caravan, the forest, and what we discovered."
