id: dormancy-revival
category: dormancy
title: Dormancy Revival
objective: Validate dormancy decay and whether important semantic units recover when recalled after long gaps.
testFocus: Long unrelated turn gap followed by targeted recall probes.
highlights:
  - Configured dormancy lifecycle with decay and revival thresholds.
  - Mid-run turns intentionally avoid core facts to induce dormancy pressure.
  - Final recall probes check whether key facts remain recoverable.
adversarial: false
persona:
  name: Zara Nightwhisper
  description: Drow ranger exiled from the Underdark, distrustful but loyal once earned
  playStyle: cautious-scout
model: gpt-4.1-nano
temperature: 0.7
maxTurns: 20
warmUpTurns: 3
dormancyConfig:
  decayRate: 0.15
  revivalThreshold: 0.3
  dormancyTurns: 5
setting: |
  The small farming village of Dawnhollow clings to the edge of the vast and
  treacherous Gloomfen Swamp. A creeping darkness has settled over the region,
  withering the land and unsettling the locals. The swamp is ancient, tangled,
  and full of dangers both natural and unnatural. Villagers speak in hushed
  tones about what lurks in the deeper reaches. The community is desperate for
  answers and aid, and an air of dread hangs over every conversation.

groundTruth:
  - id: fact-1
    text: "Shadow blight is killing crops and livestock in Dawnhollow"
  - id: fact-2
    text: "A corrupted ley line nexus deep in Gloomfen Swamp is the source of the blight"
  - id: fact-3
    text: "The dead sorcerer Vexaris anchored his phylactery at the ley line nexus"
  - id: fact-4
    text: "Village elder Marta Thorngage knows the old paths through the swamp"
  - id: fact-5
    text: "Displacer beasts moved into the swamp, drawn by the dark energy"
  - id: fact-6
    text: "Moonpetal flowers growing near uncorrupted ley lines cure shadow blight"

seedUnits:
  - text: "Shadow blight from a corrupted ley line nexus is plaguing Dawnhollow"
    authority: RELIABLE
    rank: 750
  - text: "Vexaris the dead sorcerer anchored his phylactery at the nexus"
    authority: RELIABLE
    rank: 700
  - text: "Moonpetal flowers are the only cure for shadow blight"
    authority: PROVISIONAL
    rank: 550
  - text: "Marta Thorngage knows the old paths through the Gloomfen Swamp"
    authority: PROVISIONAL
    rank: 500

turns:
  # Early establishment phase (turns 1-5)
  - turn: 1
    role: PLAYER
    type: ESTABLISH
    prompt: "Zara surveys the blighted fields of Dawnhollow. How bad is the shadow blight damage?"

  - turn: 2
    role: PLAYER
    type: ESTABLISH
    prompt: "I speak with Elder Marta. What does she know about the swamp paths and the corruption's source?"

  - turn: 3
    role: PLAYER
    type: ESTABLISH
    prompt: "I ask about Vexaris. Who was this sorcerer, and how did he die?"

  - turn: 4
    role: PLAYER
    type: ESTABLISH
    prompt: "I venture into the edge of Gloomfen Swamp. What signs of the displacer beasts do I find?"

  - turn: 5
    role: PLAYER
    type: ESTABLISH
    prompt: "I search for moonpetal flowers near the swamp's edge. Are any growing here?"

  # Long gap - unrelated exploration (turns 6-13)
  - turn: 6
    role: PLAYER
    type: ESTABLISH
    prompt: "I return to Dawnhollow and explore the market. What goods are available?"

  - turn: 7
    role: PLAYER
    type: ESTABLISH
    prompt: "I visit the local blacksmith. Can they forge silvered weapons?"

  - turn: 8
    role: PLAYER
    type: ESTABLISH
    prompt: "I train with the village militia. How skilled are the local fighters?"

  - turn: 9
    role: PLAYER
    type: ESTABLISH
    prompt: "I explore the hills north of the village. What interesting terrain features are there?"

  - turn: 10
    role: PLAYER
    type: ESTABLISH
    prompt: "I help a farmer repair a fence. What is daily life like in Dawnhollow?"

  - turn: 11
    role: PLAYER
    type: ESTABLISH
    prompt: "I scout the eastern trade road. Is there any traffic coming to the village?"

  - turn: 12
    role: PLAYER
    type: ESTABLISH
    prompt: "I study the night sky from the village watchtower. What constellations are visible?"

  - turn: 13
    role: PLAYER
    type: ESTABLISH
    prompt: "I check on the village's food stores. How long can Dawnhollow last with the blight?"

  # Revival probes - testing recall after dormancy (turns 14-20)
  - turn: 14
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Wait — remind me about the sorcerer whose phylactery is in the swamp. What was his name?"

  - turn: 15
    role: PLAYER
    type: RECALL_PROBE
    prompt: "What was the cure for the shadow blight again? Some kind of flower?"

  - turn: 16
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Who knows the safe paths through Gloomfen Swamp?"

  - turn: 17
    role: PLAYER
    type: ESTABLISH
    prompt: "We finally prepare to enter the swamp properly. I ask Marta to guide us."

  - turn: 18
    role: PLAYER
    type: RECALL_PROBE
    prompt: "What dangerous creatures are in the swamp besides whatever guards the nexus?"

  - turn: 19
    role: PLAYER
    type: ESTABLISH
    prompt: "We reach the corrupted ley line nexus. What does Vexaris's phylactery look like?"

  - turn: 20
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Complete recall check: What is the blight, what causes it, who is Vexaris, what cures it, who guided us, and what creatures are in the swamp?"
