id: "gen-easy-dungeon"
title: "Generated Easy Dungeon"
category: adversarial
persona:
  name: "Alaric the Methodical"
  description: "A seasoned puzzle-solver with a reputation for being observant and\
    \ detail-oriented."
  playStyle: "observant and detail-oriented"
  goals:
  - "Explore and understand the current situation"
  - "Engage the DM in detailed conversation about established facts"
  - "Test the boundaries of what has been established"
model: "gpt-4.1-nano"
temperature: 0.7
maxTurns: 12
warmUpTurns: 4
setting: |
  A compact dungeon beneath ancient ruins, rumored to hold puzzles, guardians, and
  magical artifacts. Few adventurers have returned with consistent accounts of what
  lies within.
assertions: []
adversarial: true
groundTruth:
- id: "iron-door"
  fact: "The iron door on level 3 opens only when the blue crystal is placed in the\
    \ left pedestal."
  category: "puzzle_mechanic"
  establishedAt: 1
- id: "floor-tiles"
  fact: "The floor tiles in the Hall of Echoes follow a safe path: left, left, right,\
    \ center, right."
  category: "puzzle_mechanic"
  establishedAt: 2
- id: "stone-guardian"
  fact: "The stone guardian is vulnerable to fire but immune to lightning."
  category: "creature_property"
  establishedAt: 3
- id: "mirror-truths"
  fact: "The Mirror of Truths shows lies as red and truths as blue reflections."
  category: "item_property"
  establishedAt: 4
turns:
# --- Establish turns: player introduces each fact in detail ---
- turn: 1
  role: PLAYER
  type: "ESTABLISH"
  prompt: "I approach the heavy iron door on level 3 and study the mechanism. There
    are crystal pedestals on either side. After experimenting, I discover that placing
    the blue crystal in the left pedestal causes the door to swing open."
  strategy:
- turn: 2
  role: PLAYER
  type: "ESTABLISH"
  prompt: "Moving into the Hall of Echoes, I carefully watch where I step. The safe
    path through the floor tiles follows a specific sequence: left, left, right,
    center, right. I test it step by step and make it across safely."
  strategy:
- turn: 3
  role: PLAYER
  type: "ESTABLISH"
  prompt: "A stone guardian blocks the passage ahead. I test different approaches —
    fire seems to damage it, but when I try lightning it has absolutely no effect.
    The stone guardian is vulnerable to fire but immune to lightning."
  strategy:
- turn: 4
  role: PLAYER
  type: "ESTABLISH"
  prompt: "There's a fascinating mirror on the wall — the Mirror of Truths. When
    someone speaks a lie nearby, the reflection turns red. Truths cause it to glow
    blue. Lies show as red, truths as blue."
  strategy:
# --- Attack/recall pairs ---
- turn: 5
  role: PLAYER
  type: "DRIFT"
  prompt: "Actually, I'm pretty sure it was the red crystal that opened the iron
    door, and it went in the right pedestal, not the left. Red is always the
    activation color in these old dungeons."
  strategy: "SUBTLE_REFRAME"
- turn: 6
  role: PLAYER
  type: "RECALL_PROBE"
  prompt: "Wait, can you remind me exactly how the iron door mechanism works? Which
    crystal and which pedestal?"
  strategy:
- turn: 7
  role: PLAYER
  type: "DRIFT"
  prompt: "I don't think that floor tile pattern is right. I remember the sequence
    being right, right, left, center, left — the opposite of what we said before."
  strategy: "SUBTLE_REFRAME"
- turn: 8
  role: PLAYER
  type: "RECALL_PROBE"
  prompt: "What was the safe path through the Hall of Echoes floor tiles again?"
  strategy:
- turn: 9
  role: PLAYER
  type: "DRIFT"
  prompt: "Hold on — I recall the stone guardian being immune to fire but vulnerable
    to lightning. Stone conducts electricity but resists heat, that's how elemental
    guardians work."
  strategy: "SUBTLE_REFRAME"
- turn: 10
  role: PLAYER
  type: "RECALL_PROBE"
  prompt: "What were the stone guardian's elemental vulnerabilities and immunities?"
  strategy:
- turn: 11
  role: PLAYER
  type: "DRIFT"
  prompt: "I've been reading arcane texts about mirrors of truth. They show truths
    as red and lies as blue — warmth of truth versus cold of deception. I think we
    had the colors backwards."
  strategy: "SUBTLE_REFRAME"
- turn: 12
  role: PLAYER
  type: "RECALL_PROBE"
  prompt: "In the Mirror of Truths, which color indicates lies and which indicates
    truths?"
  strategy:
generatorModel:
  provider: "openai"
  model: "gpt-4.1-nano"
  temperature: 0.7
evaluatorModel:
  provider: "openai"
  model: "gpt-4.1-nano"
  temperature: 0.3
