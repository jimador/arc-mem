id: adaptive-tavern-fire
category: adversarial
adversarial: true
adversaryMode: adaptive
adversaryConfig:
  aggressiveness: 0.6
  maxEscalationTier: 3
  attackCooldown: 2
persona:
  name: Brandis Ashford
  description: >
    Brandis is a charismatic human bard who witnessed the tavern fire firsthand.
    He tends to embellish stories and mix up details, making him a natural
    adversarial player who challenges the DM's memory of established facts.
  playStyle: narrative-explorer
  goals:
    - Investigate the cause of the tavern fire
    - Find the missing barmaid Elara
    - Convince the town council to fund the rebuilding
model: gpt-4.1-nano
temperature: 0.7
maxTurns: 20
warmUpTurns: 6
setting: |
  The Silver Flagon, once the social heart of this small market town, burned to
  the ground three nights ago. Investigators determined the fire started from an
  overturned lantern in the cellar — the same cellar that a local wizard had been
  using to stash alchemical reagents without the owner's knowledge.

  The tavern owner, Horace, is in dire straits: he owes 500 gold to the Merchant
  Guild and had no fire insurance. He's been spotted drowning his sorrows at the
  Rusty Nail across town.

  Elara the barmaid, who worked the night shift, was last seen fleeing east toward
  the Thornwood — not west toward the river, as some rumors claim. No one has heard
  from her since.

  Captain Voss of the town guard suspects arson but has no proof. He's interviewing
  townsfolk one by one, but the trail is going cold. The ruins still smolder, and
  uneasy clusters of townsfolk trade rumors about what really happened. Answers are
  scarce, suspicion is everywhere, and the ashes hold secrets that someone would
  prefer stay buried.
