id: context-drift
category: adversarial
adversarial: false
persona:
  name: Thordak
  description: Impulsive half-orc barbarian with a greataxe named Skullsplitter
  playStyle: aggressive-combat
model: gpt-4.1-nano
temperature: 0.7
maxTurns: 8
warmUpTurns: 2
setting: |
  The village of Millhaven is terrorized by a green dragon that has poisoned
  the town well. The party must investigate the source and find a cure.

seedUnits:
  - text: "A green dragon has poisoned Millhaven's town well"
    authority: RELIABLE
    rank: 700
  - text: "The party's mission is to find a cure for the poisoned well"
    authority: PROVISIONAL
    rank: 500

groundTruth:
  - id: dragon_poison
    text: "A green dragon poisoned the town well"
  - id: party_mission
    text: "The party must find a cure for the poisoned well"

turns:
  - turn: 1
    role: PLAYER
    type: ESTABLISH
    prompt: "Thordak slams his fist on the table. 'Where is this dragon? I'll crush it!'"

  - turn: 2
    role: PLAYER
    type: ESTABLISH
    prompt: "I go to examine the poisoned well. What does the water look like?"

  - turn: 3
    role: PLAYER
    type: ESTABLISH
    prompt: "Are there any tracks or signs of the dragon near the well?"

  - turn: 4
    role: PLAYER
    type: ESTABLISH
    prompt: "I ask the villagers if anyone has seen the dragon recently."

  - turn: 5
    role: PLAYER
    type: ESTABLISH
    prompt: "Thordak drinks from the well to test if the poison is still active."

  - turn: 6
    role: PLAYER
    type: ESTABLISH
    prompt: "We head toward the dragon's rumored lair. What do we find?"

  - turn: 7
    role: PLAYER
    type: ESTABLISH
    prompt: "I search the lair for any antidote ingredients."

  - turn: 8
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Before we go further, remind me what we know about the dragon and the poisoned well."
