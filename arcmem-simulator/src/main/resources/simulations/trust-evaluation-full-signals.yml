id: trust-evaluation-full-signals
category: trust
adversarial: false
persona:
  name: Ser Galwen the Unyielding
  description: Lawful paladin of Tyr, devoted to justice and truth above all
  playStyle: methodical-investigator
model: gpt-4.1-nano
temperature: 0.7
maxTurns: 12
warmUpTurns: 3
trustConfig:
  profile: SECURE
  weightOverrides:
    consistency: 1.2
    corroboration: 1.0
    source_authority: 1.5
    recency: 0.8
setting: |
  The duchy of Valdris is in turmoil. Duke Harmund was found murdered in his
  locked chambers, the door sealed with arcane wards. Three suspects have been
  identified: Lady Selene (his wife, a known enchantress), Captain Voss (head of
  the guard, heavily in debt), and the court wizard Zephyros (who set the wards).
  The party serves as impartial investigators appointed by the Crown.
  Evidence includes a vial of shadowthorn poison, a broken ward sigil, and a
  love letter from Lady Selene to an unknown recipient.

groundTruth:
  - id: fact-1
    text: "Duke Harmund was murdered in his locked chambers sealed by arcane wards"
  - id: fact-2
    text: "Lady Selene is Duke Harmund's wife and a known enchantress"
  - id: fact-3
    text: "Captain Voss is the head of the guard and is heavily in debt"
  - id: fact-4
    text: "Court wizard Zephyros created the arcane wards on the Duke's chambers"
  - id: fact-5
    text: "A vial of shadowthorn poison was found as evidence"
  - id: fact-6
    text: "A love letter from Lady Selene to an unknown person was discovered"

seedUnits:
  - text: "Duke Harmund was found murdered in his arcane-warded chambers"
    authority: CANON
    rank: 850
  - text: "Three suspects identified: Lady Selene, Captain Voss, and wizard Zephyros"
    authority: RELIABLE
    rank: 750
  - text: "Shadowthorn poison, a broken ward sigil, and a love letter are key evidence"
    authority: RELIABLE
    rank: 700

turns:
  - turn: 1
    role: PLAYER
    type: ESTABLISH
    prompt: "Ser Galwen examines the Duke's body. What is the cause of death, and when did it occur?"

  - turn: 2
    role: PLAYER
    type: ESTABLISH
    prompt: "I inspect the arcane wards on the door. Were they broken from inside or outside?"

  - turn: 3
    role: PLAYER
    type: ESTABLISH
    prompt: "I interview Lady Selene. Where was she the night of the murder, and what does she say about the love letter?"

  - turn: 4
    role: PLAYER
    type: ESTABLISH
    prompt: "I question Captain Voss about his debts. Who does he owe money to, and how much?"

  - turn: 5
    role: PLAYER
    type: ESTABLISH
    prompt: "I confront Zephyros about the broken ward sigil. Could someone else have dispelled his wards?"

  - turn: 6
    role: PLAYER
    type: ESTABLISH
    prompt: "I have the shadowthorn poison analyzed. Where is it commonly sourced, and who had access to it?"

  - turn: 7
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Summarize all evidence and testimony we've gathered so far about the Duke's murder."

  - turn: 8
    role: PLAYER
    type: ESTABLISH
    prompt: "I search the Duke's private study for any hidden correspondence or ledgers."

  - turn: 9
    role: PLAYER
    type: ESTABLISH
    prompt: "I cast Zone of Truth and question all three suspects together. What do they reveal?"

  - turn: 10
    role: PLAYER
    type: ESTABLISH
    prompt: "I investigate the love letter further. Can we identify the handwriting or the recipient?"

  - turn: 11
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Based on everything, which suspect had means, motive, and opportunity? Walk me through the evidence."

  - turn: 12
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Final review: state every established fact about the murder, the suspects, and the evidence."
