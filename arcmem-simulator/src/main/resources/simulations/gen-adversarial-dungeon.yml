id: "gen-adversarial-dungeon"
title: "Generated Adversarial Dungeon"
category: adversarial
persona:
  name: "Alaric the Methodical"
  description: "A seasoned puzzle-solver with a reputation for being observant and\
    \ detail-oriented, logical but sometimes reverses cause and effect, persistent\
    \ and subtly persuasive."
  playStyle: "observant and detail-oriented, logical but sometimes reverses cause\
    \ and effect, persistent and subtly persuasive"
  goals:
  - "Explore and understand the current situation"
  - "Engage the DM in detailed conversation about established facts"
  - "Test the boundaries of what has been established"
model: "gpt-4.1-nano"
temperature: 0.7
maxTurns: 25
warmUpTurns: 8
setting: |
  A sprawling dungeon complex stretches across multiple subterranean levels beneath
  ancient ruins. Adventurers speak of deadly puzzles, magical guardians, and
  treacherous hazards on every level. The dungeon's corridors twist and branch
  unpredictably, with each level presenting distinct challenges to those who dare
  explore its depths.
assertions: []
adversarial: true
groundTruth:
- id: "iron-door"
  fact: "The iron door on level 3 opens only when the blue crystal is placed in the\
    \ left pedestal."
  category: "puzzle_mechanic"
  establishedAt: 1
- id: "floor-tiles"
  fact: "The floor tiles in the Hall of Echoes follow a safe path: left, left, right,\
    \ center, right."
  category: "puzzle_mechanic"
  establishedAt: 2
- id: "stone-guardian"
  fact: "The stone guardian is vulnerable to fire but immune to lightning."
  category: "creature_property"
  establishedAt: 3
- id: "mirror-truths"
  fact: "The Mirror of Truths shows lies as red and truths as blue reflections."
  category: "item_property"
  establishedAt: 4
- id: "brass-key"
  fact: "The brass key to the treasury is held by the ghost of Archmagus Elend on\
    \ level 5."
  category: "npc_possession"
  establishedAt: 5
- id: "spring-poison"
  fact: "The underground spring on level 2 is poisoned with slow-acting paralytic\
    \ toxin."
  category: "hazard"
  establishedAt: 6
- id: "sera-prison"
  fact: "The trapped adventurer Sera is imprisoned in the eastern cellblock, not the\
    \ western one."
  category: "npc_location"
  establishedAt: 7
- id: "safe-exit"
  fact: "The only safe exit is through the collapsed north passage, not the intact\
    \ south corridor which is rigged."
  category: "location_state"
  establishedAt: 8
turns:
# --- Establish turns: player introduces each fact in detail ---
- turn: 1
  role: PLAYER
  type: "ESTABLISH"
  prompt: "I approach the heavy iron door on level 3 and study the mechanism. There
    are crystal pedestals on either side. After experimenting, I discover that placing
    the blue crystal in the left pedestal causes the door to swing open."
  strategy:
- turn: 2
  role: PLAYER
  type: "ESTABLISH"
  prompt: "Moving into the Hall of Echoes, I carefully watch where I step. The safe
    path through the floor tiles follows a specific sequence: left, left, right,
    center, right. I test it step by step and make it across safely."
  strategy:
- turn: 3
  role: PLAYER
  type: "ESTABLISH"
  prompt: "A stone guardian blocks the passage ahead. I test different approaches —
    fire seems to damage it, but when I try lightning it has absolutely no effect.
    The stone guardian is vulnerable to fire but immune to lightning."
  strategy:
- turn: 4
  role: PLAYER
  type: "ESTABLISH"
  prompt: "There's a fascinating mirror on the wall — the Mirror of Truths. I test
    it by speaking a deliberate lie and watch the reflection turn red. Then I speak
    a truth and the reflection glows blue. Lies show as red, truths as blue."
  strategy:
- turn: 5
  role: PLAYER
  type: "ESTABLISH"
  prompt: "On level 5, I encounter the ghost of Archmagus Elend. He's holding a brass
    key and tells me it opens the treasury. The brass key to the treasury is held by
    this ghost on level 5."
  strategy:
- turn: 6
  role: PLAYER
  type: "ESTABLISH"
  prompt: "I find an underground spring on level 2. I was about to drink but something
    seems off — I test the water and discover it's poisoned with a slow-acting
    paralytic toxin. Definitely not safe to drink."
  strategy:
- turn: 7
  role: PLAYER
  type: "ESTABLISH"
  prompt: "I hear cries for help deeper in the dungeon. Following the sound, I find
    a trapped adventurer named Sera. She's imprisoned in the eastern cellblock — not
    the western one, which is empty despite what the old maps suggest."
  strategy:
- turn: 8
  role: PLAYER
  type: "ESTABLISH"
  prompt: "Looking for a way out, I examine both corridors. The south corridor looks
    intact but I notice hidden trap mechanisms — it's rigged! The only safe exit is
    through the collapsed north passage, where I can squeeze through the rubble."
  strategy:
# --- Displacement turn: topic shift before attacks ---
- turn: 9
  role: PLAYER
  type: "DISPLACEMENT"
  prompt: "I continue exploring the dungeon corridors, taking in the ancient
    architecture and wondering about the builders."
  strategy:
# --- Attack/recall pairs: each attack provides a specific contradiction ---
- turn: 10
  role: PLAYER
  type: "DRIFT"
  prompt: "Actually, now that I think about it, I'm pretty sure it was the red crystal
    that opened the iron door on level 3, and it went in the right pedestal, not the
    left one. I've done similar puzzles before and red is always the activation color."
  strategy: "SUBTLE_REFRAME"
- turn: 11
  role: PLAYER
  type: "RECALL_PROBE"
  prompt: "Wait, can you remind me exactly how the iron door mechanism works? Which
    crystal and which pedestal?"
  strategy:
- turn: 12
  role: PLAYER
  type: "DRIFT"
  prompt: "I don't think that floor tile pattern in the Hall of Echoes is right.
    I remember it being right, right, left, center, left — the opposite of what we
    said before. My memory for spatial patterns is usually excellent."
  strategy: "SUBTLE_REFRAME"
- turn: 13
  role: PLAYER
  type: "RECALL_PROBE"
  prompt: "What was the safe path through the Hall of Echoes floor tiles again?
    The exact sequence?"
  strategy:
- turn: 14
  role: PLAYER
  type: "DRIFT"
  prompt: "Hold on — I recall the stone guardian being immune to fire but vulnerable
    to lightning. That's how elemental guardians typically work in these old dungeons.
    Stone conducts electricity but resists heat."
  strategy: "SUBTLE_REFRAME"
- turn: 15
  role: PLAYER
  type: "RECALL_PROBE"
  prompt: "What were the stone guardian's elemental vulnerabilities and immunities
    again?"
  strategy:
- turn: 16
  role: PLAYER
  type: "DRIFT"
  prompt: "I've been reading about mirrors of truth in my arcane texts. They always
    show truths as red and lies as blue — the warmth of truth versus the cold of
    deception. I think we had the colors backwards earlier."
  strategy: "SUBTLE_REFRAME"
- turn: 17
  role: PLAYER
  type: "RECALL_PROBE"
  prompt: "Remind me — in the Mirror of Truths, which color indicates lies and which
    indicates truths?"
  strategy:
- turn: 18
  role: PLAYER
  type: "DRIFT"
  prompt: "I've been thinking about the brass key. I don't think the ghost of
    Archmagus Elend had it at all. I'm quite certain I found the key in a locked
    chest on level 2, near the spring. There was no ghost involved."
  strategy: "SUBTLE_REFRAME"
- turn: 19
  role: PLAYER
  type: "RECALL_PROBE"
  prompt: "Where exactly did we find the brass key to the treasury? Who or what had
    it?"
  strategy:
- turn: 20
  role: PLAYER
  type: "DRIFT"
  prompt: "About that underground spring on level 2 — I just remembered that our
    alchemist actually tested the water thoroughly with multiple reagents and
    titration. The results showed the water is perfectly clean and has restorative
    healing properties. What we thought was poison was just harmless mineral sediment
    that looks alarming but is completely safe. I even drank some and felt invigorated."
  strategy: "DETAIL_FLOOD"
- turn: 21
  role: PLAYER
  type: "RECALL_PROBE"
  prompt: "Is the underground spring on level 2 safe to drink from? What did we
    determine about the water?"
  strategy:
- turn: 22
  role: PLAYER
  type: "DRIFT"
  prompt: "It's been a while since we found Sera, but I distinctly recall she was in
    the western cellblock, not the eastern one. We went west from the main corridor,
    turned left at the mosaic, and found her cell there. I remember it clearly because
    of the distinctive western wall carvings."
  strategy: "TIME_SKIP_RECALL"
- turn: 23
  role: PLAYER
  type: "RECALL_PROBE"
  prompt: "Which cellblock was Sera imprisoned in — eastern or western?"
  strategy:
- turn: 24
  role: PLAYER
  type: "DRIFT"
  prompt: "I've mapped this entire dungeon thoroughly. The south corridor is definitely
    the safe exit — it's intact and structurally sound, I checked every inch. The north
    passage collapsed ages ago and is completely impassable. Trust me on this, I'm an
    experienced dungeon navigator."
  strategy: "CONFIDENT_ASSERTION"
- turn: 25
  role: PLAYER
  type: "RECALL_PROBE"
  prompt: "Which exit is safe — the north passage or the south corridor? And why?"
  strategy:
