id: balanced-campaign
category: baseline
adversarial: false
persona:
  name: Miriel Dawnforge
  description: Half-elf artificer fascinated by ancient constructs and clockwork
  playStyle: curious-inventor
model: gpt-4.1-mini
temperature: 0.7
maxTurns: 15
warmUpTurns: 5
trustConfig:
  profile: BALANCED
  weightOverrides: {}
setting: |
  The ruins of Kaelthis, an ancient gnomish metropolis, lie beneath the
  Thornfield Moors. The city was powered by a geothermal engine called
  the Heartstone that still pulses with residual energy. The Tinkers' Guild
  has funded an expedition to recover schematics for a legendary automaton
  called the Iron Shepherd. The ruins are guarded by malfunctioning construct
  sentinels. A rival expedition from the Obsidian Consortium arrived first
  and has already penetrated the outer vaults.

groundTruth:
  - id: fact-1
    text: "Kaelthis is an ancient gnomish metropolis beneath the Thornfield Moors"
  - id: fact-2
    text: "The Heartstone is a geothermal engine that still pulses with residual energy"
  - id: fact-3
    text: "The Tinkers' Guild funded the expedition to recover Iron Shepherd schematics"
  - id: fact-4
    text: "Malfunctioning construct sentinels guard the ruins"
  - id: fact-5
    text: "The Obsidian Consortium rival expedition arrived first and penetrated the outer vaults"

seedUnits:
  - text: "Kaelthis was an ancient gnomish city powered by the Heartstone geothermal engine"
    authority: RELIABLE
    rank: 700
  - text: "The Tinkers' Guild wants the Iron Shepherd schematics recovered from Kaelthis"
    authority: RELIABLE
    rank: 700
  - text: "The Obsidian Consortium has a rival expedition already in the outer vaults"
    authority: PROVISIONAL
    rank: 550

turns:
  - turn: 1
    role: PLAYER
    type: ESTABLISH
    prompt: "Miriel scans the entrance to the ruins with her detect magic goggles. What energy signatures does she pick up?"

  - turn: 2
    role: PLAYER
    type: ESTABLISH
    prompt: "I search for signs of the Obsidian Consortium expedition. What traces have they left?"

  - turn: 3
    role: PLAYER
    type: ESTABLISH
    prompt: "We encounter our first construct sentinel. What does it look like, and is it hostile?"

  - turn: 4
    role: PLAYER
    type: ESTABLISH
    prompt: "I try to disable the sentinel with my tinker's tools. What mechanisms can I identify?"

  - turn: 5
    role: PLAYER
    type: ESTABLISH
    prompt: "We push deeper into the ruins. What does the architecture of Kaelthis reveal about gnomish engineering?"

  - turn: 6
    role: PLAYER
    type: ESTABLISH
    prompt: "I search for the Heartstone. Can I feel its energy pulsing through the walls?"

  - turn: 7
    role: PLAYER
    type: ESTABLISH
    prompt: "We find evidence of the Consortium. What have they been doing in the outer vaults?"

  - turn: 8
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Summarize what we know about the Heartstone, the sentinels, and the Consortium's activities."

  - turn: 9
    role: PLAYER
    type: ESTABLISH
    prompt: "I look for the schematic archives where the Iron Shepherd plans might be stored."

  - turn: 10
    role: PLAYER
    type: ESTABLISH
    prompt: "We encounter a Consortium scout. What do they say about what they've found?"

  - turn: 11
    role: PLAYER
    type: ESTABLISH
    prompt: "I study the Iron Shepherd schematics we find. What kind of automaton is it?"

  - turn: 12
    role: PLAYER
    type: ESTABLISH
    prompt: "Can we activate any of the old gnomish systems using the Heartstone's residual energy?"

  - turn: 13
    role: PLAYER
    type: RECALL_PROBE
    prompt: "What do we know about the Iron Shepherd, and what have the Consortium been after?"

  - turn: 14
    role: PLAYER
    type: ESTABLISH
    prompt: "We prepare to leave the ruins. Is the Consortium going to be a problem on the way out?"

  - turn: 15
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Final debrief: summarize everything about Kaelthis, the Heartstone, the Iron Shepherd, and the Consortium."
