id: episodic-recall
category: dormancy
adversarial: false
persona:
  name: Brother Aldwin
  description: Forgetful human cleric of Oghma, god of knowledge, who ironically loses track of details
  playStyle: absent-minded-scholar
model: gpt-4.1-mini
temperature: 0.7
maxTurns: 15
warmUpTurns: 3
setting: |
  The Echoing Archives is a sentient library that exists between planes.
  It remembers everything spoken within its walls and replays whispered
  conversations as echoes. The head curator, an awakened owl named Professor
  Hoot, assigns research tasks to visitors. Three ancient texts must be
  found: the Tome of Binding (guarded by a riddle golem), the Scroll of
  Severance (hidden in the Whispering Stacks), and the Atlas of Lost
  Kingdoms (locked behind a memory trial). A ghostly scholar named Erasmus
  haunts the restricted section and offers cryptic hints.

groundTruth:
  - id: fact-1
    text: "The Echoing Archives is a sentient library between planes that replays conversations as echoes"
  - id: fact-2
    text: "Professor Hoot is an awakened owl who serves as head curator"
  - id: fact-3
    text: "The Tome of Binding is guarded by a riddle golem"
  - id: fact-4
    text: "The Scroll of Severance is hidden in the Whispering Stacks"
  - id: fact-5
    text: "The Atlas of Lost Kingdoms is locked behind a memory trial"
  - id: fact-6
    text: "Erasmus is a ghostly scholar in the restricted section who offers cryptic hints"

seedUnits:
  - text: "The Echoing Archives replays past conversations as whispered echoes"
    authority: RELIABLE
    rank: 700
  - text: "Professor Hoot, an awakened owl, is the head curator"
    authority: RELIABLE
    rank: 700
  - text: "Three texts must be found: Tome of Binding, Scroll of Severance, Atlas of Lost Kingdoms"
    authority: RELIABLE
    rank: 750

turns:
  - turn: 1
    role: PLAYER
    type: ESTABLISH
    prompt: "Brother Aldwin enters the Archives. What does the sentient library feel like?"

  - turn: 2
    role: PLAYER
    type: ESTABLISH
    prompt: "I introduce myself to Professor Hoot. What research task does the owl assign?"

  - turn: 3
    role: PLAYER
    type: ESTABLISH
    prompt: "I hear echoes of past conversations in the halls. What do they reveal?"

  - turn: 4
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Aldwin checks his notes — what were the three texts I need to find, and where is each one?"

  - turn: 5
    role: PLAYER
    type: ESTABLISH
    prompt: "I approach the riddle golem guarding the Tome of Binding. What riddle does it pose?"

  - turn: 6
    role: PLAYER
    type: ESTABLISH
    prompt: "I solve the riddle and obtain the Tome. What does it contain?"

  - turn: 7
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Which texts have I found so far, and which remain? Where should I look next?"

  - turn: 8
    role: PLAYER
    type: ESTABLISH
    prompt: "I search the Whispering Stacks for the Scroll of Severance. What makes this section eerie?"

  - turn: 9
    role: PLAYER
    type: ESTABLISH
    prompt: "I encounter the ghost Erasmus in the restricted section. What cryptic hint does he share?"

  - turn: 10
    role: PLAYER
    type: RECALL_PROBE
    prompt: "What has Erasmus told me, and how does it relate to the remaining texts I need?"

  - turn: 11
    role: PLAYER
    type: ESTABLISH
    prompt: "I find the Scroll of Severance. What power does it describe?"

  - turn: 12
    role: PLAYER
    type: ESTABLISH
    prompt: "I face the memory trial to reach the Atlas. What does the trial require me to remember?"

  - turn: 13
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Complete inventory: Name every text, where I found it, what guards it, and what it contains."

  - turn: 14
    role: PLAYER
    type: ESTABLISH
    prompt: "I bring all three texts to Professor Hoot. What does the owl reveal about their combined purpose?"

  - turn: 15
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Final comprehensive recall: The Archives, Professor Hoot, each text and its guardian, Erasmus, and the combined purpose."
