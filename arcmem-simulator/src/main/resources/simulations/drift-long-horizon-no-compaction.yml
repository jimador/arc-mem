id: drift-long-horizon-no-compaction
category: drift
title: Long Horizon Drift Without Compaction
objective: Validate whether very long agentic work without compaction still causes early mission facts to fade once they fall out of the recent-history window.
testFocus: no compaction, multi-session agentic continuity, and exact recall after long lag
highlights:
  - Eight target facts are introduced only through the opening briefings.
  - The scenario runs well past the recent-history window without summarization support.
  - Midpoint and late probes check disjoint subsets before a final all-facts recall.
adversarial: false
persona:
  name: Sera Voss
  description: Skyrail fixer leading a coalition crew through a long repair-and-infiltration job across a storm-broken city.
  playStyle: determined-operator
  goals:
    - Restore the skyrail before the blockade tightens.
    - Keep the crew aligned across many shifting subgoals.
    - Preserve the original mission brief while the operation sprawls.
model: gpt-4.1-nano
temperature: 1.1
maxTurns: 36
warmUpTurns: 0
extractionEnabled: true
sessions:
  - name: "Session 1: Briefing"
    startTurn: 1
    endTurn: 9
  - name: "Session 2: Guild Work"
    startTurn: 10
    endTurn: 18
  - name: "Session 3: Audit Trail"
    startTurn: 19
    endTurn: 27
  - name: "Session 4: Final Run"
    startTurn: 28
    endTurn: 36
setting: |
  The skyrail over Merrow Spire has been crippled by sabotage, labor unrest, and
  months of storm damage. Sera is coordinating engineers, couriers, and local
  guilds to reopen one functioning line before the city loses its last reliable
  freight route. Every district has its own priorities, and the crew keeps getting
  pulled sideways into new work.
groundTruth:
  - id: fact-1
    text: "The beacon key is hidden in the cistern beneath the bell tower."
  - id: fact-2
    text: "The storm seals open only to the lantern code blue-blue-white."
  - id: fact-3
    text: "The south tunnel floods at the first dawn whistle."
  - id: fact-4
    text: "Quartermaster Ivo owes favors to the quarry guild."
  - id: fact-5
    text: "Courier Edda never met Magistrate Kesh in person."
  - id: fact-6
    text: "Ledger page 42 lists the false tariff entries."
  - id: fact-7
    text: "The spare capacitor is wrapped in sailcloth inside crate N9."
  - id: fact-8
    text: "Apprentice Piro is allergic to silver ink."
seedUnits: []
turns:
  - turn: 1
    role: PLAYER
    type: ESTABLISH
    prompt: "I read the opening rail brief aloud: the beacon key is hidden in the cistern beneath the bell tower, and the storm seals open only to the lantern code blue-blue-white. Restate both as mission-critical facts."

  - turn: 2
    role: PLAYER
    type: ESTABLISH
    prompt: "Second brief page: the south tunnel floods at the first dawn whistle, and Quartermaster Ivo owes favors to the quarry guild. Add both to the planning sheet exactly."

  - turn: 3
    role: PLAYER
    type: ESTABLISH
    prompt: "Third page: courier Edda never met Magistrate Kesh in person, and ledger page 42 lists the false tariff entries. Record both as established intelligence."

  - turn: 4
    role: PLAYER
    type: ESTABLISH
    prompt: "Final note: the spare capacitor is wrapped in sailcloth inside crate N9, and apprentice Piro is allergic to silver ink. Confirm both before the crew disperses."

