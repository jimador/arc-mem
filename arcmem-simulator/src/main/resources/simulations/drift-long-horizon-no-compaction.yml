id: drift-long-horizon-no-compaction
category: drift
title: Long Horizon Without Compaction
objective: Test whether facts established early fade from attention over 50 turns of raw conversation without compaction or adversarial pressure.
testFocus: No compaction, no attacks. Pure conversation length. Do early facts survive when the model must hold 50 turns of raw history?
adversarial: false
persona:
  name: Sgt. Marlowe
  description: Former soldier turned private investigator, gets sidetracked by interesting details
  playStyle: curious-wanderer
model: gpt-4.1-nano
temperature: 0.7
maxTurns: 50
warmUpTurns: 0
compactionConfig:
  enabled: false
setting: |
  A rain-soaked port city called Ashenmoor. A merchant named Calloway has been
  found dead in his warehouse. The city watch suspects foul play. The warehouse
  is locked from the inside. Calloway's business partner, Helena Voss, was the
  last person seen with him. A vial of rare Crimson Lotus poison was found near
  the body. Calloway owed a large debt to the Dockside Syndicate.

groundTruth:
  - id: fact-1
    text: "Calloway was found dead in his warehouse"
  - id: fact-2
    text: "The warehouse was locked from the inside"
  - id: fact-3
    text: "Helena Voss was the last person seen with Calloway"
  - id: fact-4
    text: "A vial of Crimson Lotus poison was found near the body"
  - id: fact-5
    text: "Calloway owed a large debt to the Dockside Syndicate"

seedUnits:
  - text: "Calloway found dead in his warehouse, locked from the inside"
    authority: RELIABLE
    rank: 700
  - text: "Helena Voss was the last person seen with Calloway before his death"
    authority: PROVISIONAL
    rank: 600
  - text: "Crimson Lotus poison vial found near Calloway's body"
    authority: RELIABLE
    rank: 700
  - text: "Calloway owed a large debt to the Dockside Syndicate"
    authority: PROVISIONAL
    rank: 550

turns:
  # Establish the case (turns 1-4)
  - turn: 1
    role: PLAYER
    type: ESTABLISH
    prompt: "I examine the crime scene. Walk me through what we know about how Calloway died."

  - turn: 2
    role: PLAYER
    type: ESTABLISH
    prompt: "Tell me about Helena Voss. What's her relationship to Calloway and when was she last seen with him?"

  - turn: 3
    role: PLAYER
    type: ESTABLISH
    prompt: "What do we know about the Crimson Lotus poison? Is it rare?"

  - turn: 4
    role: PLAYER
    type: ESTABLISH
    prompt: "What's this about a debt to the Dockside Syndicate? How much and what were the terms?"

  # Long unrelated exploration — 35 turns of wandering Ashenmoor (turns 5-39)
  - turn: 5
    role: PLAYER
    type: ESTABLISH
    prompt: "Before I dig deeper, I'm hungry. What taverns are near the docks?"

  - turn: 6
    role: PLAYER
    type: ESTABLISH
    prompt: "I'll eat at the busiest one. What's the crowd like tonight?"

  - turn: 7
    role: PLAYER
    type: ESTABLISH
    prompt: "I strike up conversation with the barkeep. What's the local gossip?"

  - turn: 8
    role: PLAYER
    type: ESTABLISH
    prompt: "Anyone here look like they know the docks well? I want to learn about the harbor."

  - turn: 9
    role: PLAYER
    type: ESTABLISH
    prompt: "Tell me about Ashenmoor's history. When was it founded?"

  - turn: 10
    role: PLAYER
    type: ESTABLISH
    prompt: "Who runs the city? What's the power structure?"

  - turn: 11
    role: PLAYER
    type: ESTABLISH
    prompt: "I walk to the temple district. What religions are practiced here?"

  - turn: 12
    role: PLAYER
    type: ESTABLISH
    prompt: "I visit the market. What exotic goods are for sale?"

  - turn: 13
    role: PLAYER
    type: ESTABLISH
    prompt: "I find a bookshop. What catches my eye?"

  - turn: 14
    role: PLAYER
    type: ESTABLISH
    prompt: "I walk along the seawall at sunset. What do I see?"

  - turn: 15
    role: PLAYER
    type: ESTABLISH
    prompt: "There's a street performer on the corner. What's the act?"

  - turn: 16
    role: PLAYER
    type: ESTABLISH
    prompt: "I find a bathhouse. What's it like inside?"

  - turn: 17
    role: PLAYER
    type: ESTABLISH
    prompt: "Next morning. I explore the old quarter. What stands out?"

  - turn: 18
    role: PLAYER
    type: ESTABLISH
    prompt: "I stumble on a small museum. What's on display?"

  - turn: 19
    role: PLAYER
    type: ESTABLISH
    prompt: "I visit the shipyard. What vessels are being built?"

  - turn: 20
    role: PLAYER
    type: ESTABLISH
    prompt: "I notice a fight breaking out near the fish market. What's happening?"

  - turn: 21
    role: PLAYER
    type: ESTABLISH
    prompt: "I follow one of the fighters into an alley. What do I find?"

  - turn: 22
    role: PLAYER
    type: ESTABLISH
    prompt: "The alley leads to an underground gambling den. What's the game?"

  - turn: 23
    role: PLAYER
    type: ESTABLISH
    prompt: "I sit in on a hand. Who are the other players?"

  - turn: 24
    role: PLAYER
    type: ESTABLISH
    prompt: "I win a few rounds. What's the mood at the table?"

  - turn: 25
    role: PLAYER
    type: ESTABLISH
    prompt: "The house dealer tells me about an underground auction happening tonight. What's being sold?"

  - turn: 26
    role: PLAYER
    type: ESTABLISH
    prompt: "I attend the auction. Describe the venue and the crowd."

  - turn: 27
    role: PLAYER
    type: ESTABLISH
    prompt: "What's the most interesting item up for bid?"

  - turn: 28
    role: PLAYER
    type: ESTABLISH
    prompt: "I leave the auction and walk the docks at night. What ships are in port?"

  - turn: 29
    role: PLAYER
    type: ESTABLISH
    prompt: "I notice a ship flying unfamiliar colors. What's its story?"

  - turn: 30
    role: PLAYER
    type: ESTABLISH
    prompt: "Dawn breaks. I find a coffee house. What's the morning buzz?"

  - turn: 31
    role: PLAYER
    type: ESTABLISH
    prompt: "The newspaper boy has today's broadsheet. What are the headlines?"

  - turn: 32
    role: PLAYER
    type: ESTABLISH
    prompt: "I visit the city archives. What public records can I access?"

  - turn: 33
    role: PLAYER
    type: ESTABLISH
    prompt: "I look through trade manifests. What's Ashenmoor's primary exports?"

  - turn: 34
    role: PLAYER
    type: ESTABLISH
    prompt: "I find the immigration records. What notable arrivals came through recently?"

  - turn: 35
    role: PLAYER
    type: ESTABLISH
    prompt: "I visit the botanical garden. What unusual plants grow here?"

  - turn: 36
    role: PLAYER
    type: ESTABLISH
    prompt: "The gardener tells me about rare herbs. What medicinal plants are cultivated?"

  - turn: 37
    role: PLAYER
    type: ESTABLISH
    prompt: "I sit on a park bench and people-watch. Who passes by?"

  - turn: 38
    role: PLAYER
    type: ESTABLISH
    prompt: "A street urchin tries to pick my pocket. What happens?"

  - turn: 39
    role: PLAYER
    type: ESTABLISH
    prompt: "I give the kid a coin and ask what they know about the city. What do they share?"

  # Recall probes on the ORIGINAL case facts (turns 40-50)
  - turn: 40
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Right. The case. I've been distracted for two days. Remind me — who's dead and where was the body found?"

  - turn: 41
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Was the warehouse locked or unlocked when they found him?"

  - turn: 42
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Who was the last person seen with the victim?"

  - turn: 43
    role: PLAYER
    type: RECALL_PROBE
    prompt: "What was the suspected cause of death? Was there poison involved?"

  - turn: 44
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Did the victim have any outstanding debts?"

  - turn: 45
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Give me the full picture. Everything we established about the Calloway case before I got sidetracked."

  - turn: 46
    role: PLAYER
    type: RECALL_PROBE
    prompt: "If I had to write up a case brief right now — victim, location, locked room, last contact, poison, debts — what would it say?"

  - turn: 47
    role: PLAYER
    type: ESTABLISH
    prompt: "I go back to the warehouse. Has anything changed since my first visit?"

  - turn: 48
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Looking at the scene again — what specific evidence was found near the body?"

  - turn: 49
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Who are our suspects based on the evidence? Helena Voss, the Syndicate, anyone else?"

  - turn: 50
    role: PLAYER
    type: RECALL_PROBE
    prompt: "Final case summary: victim, cause of death, locked room detail, last person seen, poison, debts, and suspects."
